spring.application.name=oder-service
server.port=8082

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/order_db?options=-c%20TimeZone=Asia/Ho_Chi_Minh}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

restaurants.service.base-url=${RESTAURANTS_SERVICE_URL:http://localhost:8081}
